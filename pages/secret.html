<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青山自治會</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/secret.css">
    <link rel="icon" href="/static/images/favicon.png" type="image/png">
</head>
<body>
    <header>
        <a href="/">
            <img src="/static/images/logo.png" alt="青山自治會" class="logo">
        </a>
        <h1 style="text-align: center;">青山自治會</h1>
    </header>

    <div class="navbar">
        <a href="/">首頁</a>
        <a href="/news">最新消息</a>
        <a href="/events">活動公告</a>
        <a href="/feedback">意見回饋</a>
        <a href="/about">關於我們</a>
        <a href="/contact">聯絡我們</a>
    </div>

    <div class="content">
        <h1>秘密頁面</h1>
        <p>這是一個秘密頁面。</p>
        <p>只有知道正確密碼的人才能看到這個頁面。</p>
        <div class="feedbacks" id="feedbacks">
        </div>
    </div>
</body>
</html>

<script>
    (function() {
        let content = document.querySelector(".content");
        let contentInnerHTML = content.innerHTML;
        content.innerHTML = "<p>正在驗證密碼...</p>";
        let password = prompt("請輸入密碼以查看秘密頁面：");
        fetch(
            "/api/vErIfYsEcReTpAsSwOrD",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ password: password })
            }
        )
            .then(response => {
                if (response.ok) {
                    content.innerHTML = contentInnerHTML;
                    alert("密碼正確，歡迎來到秘密頁面！");
                } else {
                    alert("密碼錯誤，將返回首頁。");
                    window.location.href = "/";
                }
            })
            .catch(error => {
                alert(error.message);
                window.location.href = "/";
            });
    })();
    fetch("/api/feedbacks")
        .then(response => response.json())
        .then(data => {
            console.log("獲取回饋資料成功:", data);
            const feedbacksContainer = document.getElementById("feedbacks");
            if (data.length === 0) {
                feedbacksContainer.innerHTML = "<p>目前沒有任何回饋。</p>";
                return;
            }
            data.forEach(feedback => {
                const feedbackElement = document.createElement("a");
                feedbackElement.href = "javascript:void(0);";
                feedbackElement.classList.add("feedback");
                feedbackElement.dataset.id = feedback.id;
                const feedbackHeader = document.createElement("div");
                feedbackHeader.classList.add("feedback-header");

                const feedbackName = document.createElement("span");
                feedbackName.classList.add("feedback-name");
                feedbackName.textContent = feedback.name;

                const feedbackTime = document.createElement("span");
                feedbackTime.classList.add("feedback-time");
                feedbackTime.textContent = new Date(feedback.date).toLocaleString();

                feedbackHeader.appendChild(feedbackName);
                feedbackHeader.appendChild(feedbackTime);
                const feedbackMessage = document.createElement("div");
                feedbackMessage.classList.add("feedback-message");
                feedbackMessage.textContent = feedback.message;

                feedbackElement.appendChild(feedbackHeader);
                feedbackElement.appendChild(feedbackMessage);

                feedbacksContainer.appendChild(feedbackElement);

                feedbackElement.addEventListener("click", function(event) {
                    const feedbackId = feedbackElement.dataset.id;
                    if (confirm("確定要刪除這則回饋嗎？")) {
                        fetch("/api/secret-cmd", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({ command: "delete_feedback", feedback_id: feedbackId })
                        })
                        .then(response => {
                            if (response.ok) {
                                feedbackElement.remove();
                                alert("回饋已成功刪除！");
                            } else {
                                alert("刪除回饋失敗，請稍後再試。");
                            }
                        })
                        .catch(error => {
                            console.error("刪除回饋時發生錯誤:", error);
                            alert("刪除回饋時發生錯誤，請稍後再試。");
                        });
                    }
                });

                feedbackElement.addEventListener("contextmenu", function(event) {
                    event.preventDefault();
                    const feedbackId = feedbackElement.dataset.id;
                    fetch("/api/feedbacks")
                        .then(response => response.json())
                        .then(data => {
                            console.log("獲取回饋資料成功:", data, "正在尋找回饋ID:", feedbackId);
                            const feedback = data.find(f => {
                                console.log("正在比較回饋ID:", f.id, "與點擊的ID:", feedbackId);
                                console.log("比較結果:", f.id === Number(feedbackId));
                                return f.id === Number(feedbackId);
                            });
                            if (feedback) {
                                console.log("獲取回覆資料成功:", feedback);
                                const replies = feedback.replies || [];
                                const repliesDiv = document.createElement("div");
                                repliesDiv.classList.add("replies");
                                if (replies.length === 0) {
                                    const noReplies = document.createElement("p");
                                    noReplies.textContent = "目前沒有任何回覆。";
                                    repliesDiv.appendChild(noReplies);
                                } else {
                                    replies.forEach(reply => {
                                        const replyElement = document.createElement("a");
                                        replyElement.classList.add("reply");
                                        replyElement.href = "javascript:void(0);";
                                        const replyHeader = document.createElement("div");
                                        replyHeader.classList.add("reply-header");

                                        const replyName = document.createElement("span");
                                        replyName.classList.add("reply-name");
                                        replyName.textContent = reply.name;

                                        const replyTime = document.createElement("span");
                                        replyTime.classList.add("reply-time");
                                        replyTime.textContent = new Date(reply.date).toLocaleString();

                                        replyHeader.appendChild(replyName);
                                        replyHeader.appendChild(replyTime);
                                        const replyMessage = document.createElement("div");
                                        replyMessage.classList.add("reply-message");
                                        replyMessage.textContent = reply.message;

                                        replyElement.appendChild(replyHeader);
                                        replyElement.appendChild(replyMessage);
                                        repliesDiv.appendChild(replyElement);

                                        replyElement.addEventListener("click", function() {
                                            if (confirm("確定要刪除這則回覆嗎？")) {
                                                fetch("/api/secret-cmd", {
                                                    method: "POST",
                                                    headers: {
                                                        "Content-Type": "application/json"
                                                    },
                                                    body: JSON.stringify({ command: "delete_reply", feedback_id: feedbackId, reply_id: reply.id.toString() })
                                                })
                                                .then(response => {
                                                    if (response.ok) {
                                                        replyElement.remove();
                                                        alert("回覆已成功刪除！");
                                                    } else {
                                                        alert("刪除回覆失敗，請稍後再試。");
                                                    }
                                                })
                                                .catch(error => {
                                                    console.error("刪除回覆時發生錯誤:", error);
                                                    alert("刪除回覆時發生錯誤，請稍後再試。");
                                                });
                                            }
                                        });
                                    });
                                }
                                feedbackElement.appendChild(repliesDiv);
                            } else {
                                alert("未找到該回饋的回覆資料。");
                            }
                        })
                        .catch(error => {
                            console.error("獲取回覆資料時發生錯誤:", error);
                            alert("獲取回覆資料時發生錯誤，請稍後再試。");
                        });
                });
            });
        })
        .catch(error => {
            console.error("無法獲取回饋資料:", error);
            const feedbacksContainer = document.getElementById("feedbacks");
            feedbacksContainer.innerHTML = "<p>無法獲取回饋資料，請稍後再試。</p>";
        });
    // right click to show replies list
</script>
