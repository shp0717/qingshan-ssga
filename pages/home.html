<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青山自治會</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/home.css">
    <link rel="icon" href="/static/images/favicon.png" type="image/png">
</head>
<body>
    <header>
        <a href="/">
            <img src="/static/images/logo.png" alt="青山自治會" class="logo">
        </a>
        <h1 style="text-align: center;">青山自治會</h1>
    </header>

    <div class="navbar">
        <a href="/">首頁</a>
        <a href="/news">最新消息</a>
        <a href="/events">活動公告</a>
        <a href="/feedback">意見回饋</a>
        <a href="/about">關於我們</a>
        <a href="/contact">聯絡我們</a>
    </div>

    <div class="content">
        <div id="news">
            <h1>最新消息</h1>
            <div id="news-flexbox" class="flexbox"></div>
        </div>

        <div id="events">
            <h1>活動公告</h1>
            <div id="events-flexbox" class="flexbox"></div>
        </div>
    </div>
</body>
</html>

<script>
    fetch('/api/news')
        .then(response => response.json())
        .then(data => {
            const newsFlexbox = document.getElementById('news-flexbox');
            if (data.length === 0) {
                newsFlexbox.innerHTML = '<a class="item">目前沒有最新消息。</a>';
                return;
            }
            data.sort((a, b) => new Date(b.date) - new Date(a.date));
            data.forEach(item => {
                const newsItem = document.createElement('a');
                const title = document.createElement('h2');
                const summary = document.createElement('p');
                title.textContent = item.title;
                summary.textContent = item.summary;
                newsItem.appendChild(title);
                newsItem.appendChild(summary);
                newsItem.className = 'item';
                newsItem.href = `/news/${item.id}`;
                newsFlexbox.appendChild(newsItem);
            });
        })
        .catch(error => {
            console.error('Error fetching news:', error);
            const newsFlexbox = document.getElementById('news-flexbox');
            newsFlexbox.innerHTML = '<a class="item">無法載入最新消息，請稍後再試。</a>';
        });

    fetch('/api/events')
        .then(response => response.json())
        .then(data => {
            const eventsFlexbox = document.getElementById('events-flexbox');
            if (data.length === 0) {
                eventsFlexbox.innerHTML = '<a class="item">目前沒有活動公告。</a>';
                return;
            }
            data.sort((a, b) => new Date(b.date) - new Date(a.date));
            data.forEach(item => {
                const eventItem = document.createElement('a');
                const title = document.createElement('h2');
                const summary = document.createElement('p');
                title.textContent = item.title;
                summary.textContent = item.summary;
                eventItem.appendChild(title);
                eventItem.appendChild(summary);
                eventItem.className = 'item';
                eventItem.href = `/events/${item.id}`;
                eventsFlexbox.appendChild(eventItem);
            });
        })
        .catch(error => {
            console.error('Error fetching events:', error);
            const eventsFlexbox = document.getElementById('events-flexbox');
            eventsFlexbox.innerHTML = '<a class="item">無法載入活動公告，請稍後再試。</a>';
        });
</script>
