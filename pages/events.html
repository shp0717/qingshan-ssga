<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青山自治會 - 活動公告</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/events.css">
    <link rel="icon" href="/static/images/favicon.png" type="image/png">
</head>
<body>
    <header>
        <a href="/">
            <img src="/static/images/logo.png" alt="青山自治會" class="logo">
        </a>
        <h1 style="text-align: center;">青山自治會</h1>
    </header>

    <div class="navbar">
        <a href="/">首頁</a>
        <a href="/news">最新消息</a>
        <a href="/events">活動公告</a>
        <a href="/feedback">意見回饋</a>
        <a href="/about">關於我們</a>
        <a href="/contact">聯絡我們</a>
    </div>

    <div class="content">
        <h1>活動公告</h1>
        <hr>
    </div>
</body>
</html>

<script>
    // Fetch events data from the API and display it
    fetch('/api/events')
        .then(response => response.json())
        .then(data => {
            const contentDiv = document.querySelector('.content');
            data.sort((a, b) => new Date(b.date) - new Date(a.date)); // Sort events by date descending
            data.forEach(eventItem => {
                const eventElement = document.createElement('a');
                eventElement.href = `/events/${eventItem.id}`;
                eventElement.classList.add('item');
                const titleElement = document.createElement('h2');
                titleElement.textContent = eventItem.title;
                const summaryElement = document.createElement('p');
                summaryElement.textContent = eventItem.summary;
                eventElement.appendChild(titleElement);
                eventElement.appendChild(summaryElement);
                contentDiv.appendChild(eventElement);
            });
            if (data.length === 0) {
                const noEventElement = document.createElement('p');
                noEventElement.textContent = '目前沒有活動公告。';
                contentDiv.appendChild(noEventElement);
            }
        })
        .catch(error => {
            console.error('Error fetching events:', error);
            const contentDiv = document.querySelector('.content');
            const errorElement = document.createElement('p');
            errorElement.textContent = '無法載入活動公告，請稍後再試。';
            contentDiv.appendChild(errorElement);
        });
</script>
