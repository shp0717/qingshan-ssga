<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青山自治會 - 意見回饋</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/feedback.css">
    <link rel="icon" href="/static/images/favicon.png" type="image/png">
</head>
<body>
    <header>
        <a href="/">
            <img src="/static/images/logo.png" alt="青山自治會" class="logo">
        </a>
        <h1 style="text-align: center;">青山自治會</h1>
    </header>

    <div class="navbar">
        <a href="/">首頁</a>
        <a href="/news">最新消息</a>
        <a href="/events">活動公告</a>
        <a href="/feedback">意見回饋</a>
        <a href="/about">關於我們</a>
        <a href="/contact">聯絡我們</a>
    </div>

    <div class="content">
        <h1>意見回饋</h1>
        <a href="/feedback/new" class="button">新增意見回饋</a>
        <hr>
    </div>
</body>
</html>

<script>
    fetch('/api/feedbacks')
        .then(response => response.json())
        .then(data => {
            const contentDiv = document.querySelector('.content');
            data.sort((a, b) => new Date(b.date) - new Date(a.date));
            data.forEach(feedback => {
                console.log('Feedback:', feedback);
                const feedbackElement = document.createElement('a');
                feedbackElement.classList.add('item');
                feedbackElement.href = `/feedback/view?id=${feedback.id}`;
                const titleElement = document.createElement('h2');
                titleElement.textContent = feedback.title;
                const infoElement = document.createElement('p');
                const nameElement = document.createElement('strong');
                nameElement.textContent = feedback.name;
                infoElement.appendChild(nameElement);
                infoElement.append(` - ${new Date(feedback.date).toLocaleString()}`);
                const messageElement = document.createElement('p');
                messageElement.textContent = feedback.message;
                feedbackElement.appendChild(titleElement);
                feedbackElement.appendChild(infoElement);
                feedbackElement.appendChild(messageElement);
                contentDiv.appendChild(feedbackElement);
            });
            if (data.length === 0) {
                const noFeedbackElement = document.createElement('p');
                noFeedbackElement.textContent = '目前沒有任何意見回饋。';
                contentDiv.appendChild(noFeedbackElement);
            }
        })
        .catch(error => {
            console.error('Error fetching feedbacks:', error);
            const contentDiv = document.querySelector('.content');
            const errorElement = document.createElement('p');
            errorElement.textContent = '載入意見回饋時發生錯誤，請稍後再試。';
            contentDiv.appendChild(errorElement);
        });
</script>
