<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青山自治會</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/secret.css">
    <link rel="icon" href="/static/images/favicon.png" type="image/png">
</head>
<body>
    <header>
        <a href="/">
            <img src="/static/images/logo.png" alt="青山自治會" class="logo">
        </a>
        <h1 style="text-align: center;">青山自治會</h1>
    </header>

    <div class="navbar">
        <a href="/">首頁</a>
        <a href="/news">最新消息</a>
        <a href="/events">活動公告</a>
        <a href="/feedback">意見回饋</a>
        <a href="/about">關於我們</a>
        <a href="/contact">聯絡我們</a>
    </div>

    <div class="content">
        <div class="feedbacks" id="feedbacks">
        </div>
    </div>
</body>
</html>

<script>
    (function() {
        let content = document.querySelector(".content");
        let contentInnerHTML = content.innerHTML;
        content.innerHTML = "";
        let password = prompt("請輸入密碼以查看秘密頁面：");
        while (password === null) {
            password = prompt("請輸入密碼以查看秘密頁面：");
        }
        fetch(
            "/api/vErIfYsEcReTpAsSwOrD",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ password: password })
            }
        )
            .then(response => {
                if (response.ok) {
                    content.innerHTML = contentInnerHTML;
                    alert("密碼正確，歡迎來到秘密頁面！");
                    loadFeedbacks();
                } else {
                    alert("密碼錯誤，將返回首頁。");
                    window.location.href = "/";
                }
            })
            .catch(error => {
                alert(error.message);
                window.location.href = "/";
            });
    })();
    function deleteFeedback(feedbackId) {
        if (confirm("確定要刪除這則意見嗎？")) {
            fetch("/api/secret-cmd",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ command: "delete_feedback", feedback_id: feedbackId })
                }
            )
                .then(response => {
                    if (response.ok) {
                        alert("意見已刪除。");
                        location.reload();
                    } else {
                        alert("刪除意見失敗。");
                    }
                })
                .catch(error => {
                    console.error("Error deleting feedback:", error);
                    alert("刪除意見時發生錯誤。");
                }
            )
        }
    }
    function deleteReply(feedbackId, replyId) {
        if (confirm("確定要刪除這則回覆嗎？")) {
            fetch(`/api/secret-cmd`,
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ command: "delete_reply", feedback_id: feedbackId, reply_id: replyId })
                }
            )
                .then(response => {
                    if (response.ok) {
                        alert("回覆已刪除。");
                        location.reload();
                    } else {
                        alert("刪除回覆失敗。");
                    }
                })
                .catch(error => {
                    console.error("Error deleting reply:", error);
                    alert("刪除回覆時發生錯誤。");
                });
        }
    }

    function pushFeedbackToDOM(container, feedback) {
        const feedbackDiv = document.createElement("div");
        feedbackDiv.classList.add("feedback");
            const feedbackHeader = document.createElement("div");
            feedbackHeader.classList.add("feedback-header");
                const feedbackName = document.createElement("h3");
                feedbackName.classList.add("feedback-name");
                feedbackName.textContent = feedback.name;
                const feedbackDate = document.createElement("span");
                feedbackDate.classList.add("feedback-date");
                feedbackDate.textContent = new Date(feedback.date).toLocaleString();
            feedbackHeader.appendChild(feedbackName);
            feedbackHeader.appendChild(feedbackDate);
            feedbackDiv.appendChild(feedbackHeader);

            const feedbackTitle = document.createElement("div");
            feedbackTitle.classList.add("feedback-title");
            feedbackTitle.textContent = feedback.title;
            feedbackTitle.addEventListener("click", () => {
                deleteFeedback(feedback.id.toString());
            });
            feedbackDiv.appendChild(feedbackTitle);

            const feedbackMessage = document.createElement("span");
            feedbackMessage.classList.add("feedback-message");
            feedbackMessage.textContent = feedback.message;
            feedbackDiv.appendChild(feedbackMessage);

            const repliesDiv = document.createElement("div");
            repliesDiv.classList.add("replies");
            feedback.replies.forEach(reply => {
                const replyDiv = document.createElement("div");
                replyDiv.classList.add("reply");
                    const replyHeader = document.createElement("div");
                    replyHeader.classList.add("reply-header");
                        const replyName = document.createElement("h4");
                        replyName.classList.add("reply-name");
                        replyName.textContent = reply.name;
                        const replyDate = document.createElement("span");
                        replyDate.classList.add("reply-date");
                        replyDate.textContent = new Date(reply.date).toLocaleString();
                    replyHeader.appendChild(replyName);
                    replyHeader.appendChild(replyDate);
                    replyDiv.appendChild(replyHeader);

                    const replyMessage = document.createElement("span");
                    replyMessage.classList.add("reply-message");
                    replyMessage.textContent = reply.message;
                    replyDiv.appendChild(replyMessage);
                replyDiv.addEventListener("click", (e) => {
                    e.stopPropagation();
                    deleteReply(feedback.id.toString(), reply.id.toString());
                });
                repliesDiv.appendChild(replyDiv);
            });
            feedbackDiv.appendChild(repliesDiv);
        container.appendChild(feedbackDiv);
    }

    function loadFeedbacks() {
        fetch("/api/feedbacks")
            .then(response => response.json())
            .then(data => {
                const feedbacksContainer = document.getElementById("feedbacks");
                if (data.length === 0) {
                    feedbacksContainer.innerHTML = "<p>目前沒有任何意見。</p>";
                } else {
                    data.forEach(feedback => {
                        pushFeedbackToDOM(feedbacksContainer, feedback);
                    });
                }
            })
            .catch(error => {
                console.error("Error fetching feedbacks:", error);
            });
    }
</script>
