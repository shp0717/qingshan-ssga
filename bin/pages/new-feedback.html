<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青山自治會 - 新增意見回饋</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/new-feedback.css">
    <link rel="icon" href="/static/images/favicon.png" type="image/png">
</head>
<body>
    <header>
        <a href="/">
            <img src="/static/images/logo.png" alt="青山自治會" class="logo">
        </a>
        <h1 style="text-align: center;">青山自治會</h1>
    </header>

    <div class="navbar">
        <a href="/">首<span>頁</span></a>
        <a href="/news">最新<span>消息</span></a>
        <a href="/events">活動<span>公告</span></a>
        <a href="/feedback">意見<span>回饋</span></a>
        <a href="/about">關於<span>我們</span></a>
        <a href="/contact">聯絡<span>我們</span></a>
    </div>

    <div class="content">
        <h1>新增意見回饋</h1>
        <hr>
        <form id="feedback-form">
            <p class="input-group">
                <input type="text" id="name" name="name" placeholder="您的名字" required>
                <input type="text" id="title" name="title" placeholder="標題" required>
            </p>


            <textarea id="message" name="message" placeholder="內容" required></textarea>

            <button type="submit">提交</button>
        </form>
    </div>
</body>
</html>

<script>
    document.getElementById('feedback-form').addEventListener('submit', function(event) {
        event.preventDefault();
        const name = document.getElementById('name').value.trim();
        const title = document.getElementById('title').value.trim();
        const message = document.getElementById('message').value.trim();

        if (!name || !title || !message) {
            alert('請填寫所有欄位');
            return;
        }

        fetch('/api/post-feedback', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ name, title, message })
        })
        .then(response => {
            window.location.href = '/feedback';
        })
        .catch(error => {
            console.error('Error submitting feedback:', error);
            alert('提交意見回饋時發生錯誤，請稍後再試。');
        });
    });
</script>
